  <header class="bg-white border-b-2 border-slate-300 shrink-0 shadow-md sticky top-0 z-50 no-print">
    <div class="max-w-[2200px] mx-auto px-4 py-3 flex flex-col gap-3">
      
      <!-- Top Row: Logo, Nav, Actions -->
      <div class="flex items-center justify-between gap-3 flex-wrap">
        <div class="flex items-center gap-3">
          <div class="w-12 h-12 rounded-xl bg-teal-600 text-white flex items-center justify-center font-bold text-3xl shadow-sm">
            🥗
          </div>
          <div>
            <h1 class="text-2xl sm:text-3xl font-extrabold text-slate-900 leading-tight">Mon Guide Repas Sur-Mesure</h1>
            <p class="text-sm sm:text-base font-extrabold text-teal-800">Centre Hospitalier de Pau — Service Diététique</p>
          </div>
        </div>

        <!-- Navigation Tabs -->
        <nav class="flex items-center gap-2 flex-wrap">
          <button onclick="switchTab('p1')" id="tab-p1" class="tab-btn px-4 py-2.5 rounded-lg text-base sm:text-lg font-bold transition-all bg-amber-600 text-white shadow-sm flex items-center gap-2">
            <span class="text-xl">🍳</span> Petit-Déjeuner
          </button>
          <button onclick="switchTab('p2')" id="tab-p2" class="tab-btn px-4 py-2.5 rounded-lg text-base sm:text-lg font-bold transition-all bg-slate-100 text-slate-800 hover:bg-slate-200 flex items-center gap-2">
            <span class="text-xl">🍽️</span> Déjeuner
          </button>
          <button onclick="switchTab('p3')" id="tab-p3" class="tab-btn px-4 py-2.5 rounded-lg text-base sm:text-lg font-bold transition-all bg-slate-100 text-slate-800 hover:bg-slate-200 flex items-center gap-2">
            <span class="text-xl">🍎</span> Goûter
          </button>
          <button onclick="switchTab('p4')" id="tab-p4" class="tab-btn px-4 py-2.5 rounded-lg text-base sm:text-lg font-bold transition-all bg-slate-100 text-slate-800 hover:bg-slate-200 flex items-center gap-2">
            <span class="text-xl">🌙</span> Dîner
          </button>
        </nav>
      </div>

      <!-- Bottom Header Row: Selected Choices Bar -->
      <div id="selection-bar" class="bg-rose-950 text-rose-100 border-2 border-rose-600 rounded-xl px-3 sm:px-4 py-2.5 flex flex-col gap-2 shadow-lg transition-all duration-300">
        <div class="flex items-center justify-between gap-2 flex-wrap">
          <div class="flex items-center gap-2 flex-wrap">
            <span class="text-xl">🛒</span>
            <span class="text-xs sm:text-sm font-black uppercase tracking-wider text-rose-300" id="selection-bar-title">Mes Choix :</span>
            <span id="active-page-badge" class="bg-slate-800 text-teal-300 text-xs sm:text-sm px-3 py-1 rounded-full font-extrabold uppercase border border-slate-700">Petit-Déjeuner</span>
            <span id="completion-status-badge" class="bg-rose-900 text-rose-200 text-xs sm:text-sm px-2.5 py-1 rounded-full font-bold border border-rose-700">Incomplet (0/5)</span>
          </div>

          <div class="flex items-center gap-2 shrink-0">
            <div id="complete-icon-container" class="shrink-0 flex items-center">
              <span class="bg-rose-900/80 text-rose-200 text-xs sm:text-sm px-3 py-1 rounded-full font-bold flex items-center gap-1.5 border border-rose-700">
                <i data-lucide="alert-circle" class="w-4 h-4"></i> En cours
              </span>
            </div>
            <button id="reset-selections-btn" onclick="resetSelections()" class="px-3 py-1.5 bg-rose-900/70 hover:bg-rose-800 text-rose-100 text-xs sm:text-sm font-bold rounded-lg flex items-center gap-1.5 border border-rose-700 transition-all shrink-0">
              <i data-lucide="rotate-ccw" class="w-4 h-4"></i> Effacer
            </button>
          </div>
        </div>

        <div id="selected-items-container" class="flex items-center gap-2 overflow-x-auto custom-scroll py-1 w-full">
          <span class="text-sm sm:text-base text-rose-200/80 italic font-medium">Cliquez sur un aliment ci-dessous pour composer votre plateau...</span>
        </div>
      </div>

    </div>
  </header>
